<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG知识库管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fa;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            padding: 30px;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 30px;
            border-bottom: 3px solid #4CAF50;
            padding-bottom: 15px;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #e0e0e0;
        }
        .tab {
            padding: 12px 24px;
            cursor: pointer;
            background: transparent;
            border: none;
            font-size: 16px;
            color: #666;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }
        .tab.active {
            color: #4CAF50;
            border-bottom-color: #4CAF50;
            font-weight: 600;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .upload-area {
            border: 2px dashed #ccc;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            margin: 20px 0;
            background: #fafafa;
            transition: all 0.3s;
        }
        .upload-area.dragover {
            border-color: #4CAF50;
            background-color: #f0f8f0;
        }
        .btn {
            background-color: #4CAF50;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }
        .btn:hover {
            background-color: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .btn-danger {
            background-color: #f44336;
        }
        .btn-danger:hover {
            background-color: #da190b;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }
        th {
            background-color: #f5f5f5;
            font-weight: 600;
            color: #2c3e50;
        }
        tr:hover {
            background-color: #f9f9f9;
        }
        .status {
            padding: 15px;
            border-radius: 6px;
            margin: 15px 0;
        }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
        .info { background-color: #d1ecf1; color: #0c5460; }
        .warning { background-color: #fff3cd; color: #856404; }
        .file-list {
            margin: 20px 0;
        }
        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: #f9f9f9;
            margin: 5px 0;
            border-radius: 6px;
        }
        .hash-display {
            font-family: monospace;
            font-size: 12px;
            color: #666;
            word-break: break-all;
        }
        .search-box {
            padding: 10px;
            width: 300px;
            border: 1px solid #ddd;
            border-radius: 6px;
            margin-bottom: 20px;
        }
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }
        .page-btn {
            padding: 8px 16px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 4px;
            cursor: pointer;
        }
        .page-btn.active {
            background: #4CAF50;
            color: white;
            border-color: #4CAF50;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 RAG知识库管理系统</h1>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('upload')">📤 上传文件</button>
            <button class="tab" onclick="switchTab('manage')">📋 文档管理</button>
        </div>

        <!-- 上传标签页 -->
        <div id="upload-tab" class="tab-content active">
            <div class="upload-area" id="dropArea">
                <p style="font-size: 18px; color: #666;">📁 拖拽文件到这里，或</p>
                <input type="file" id="fileInput" multiple style="display:none">
                <button class="btn" onclick="document.getElementById('fileInput').click()">选择文件</button>
            </div>

            <div id="fileList" class="file-list"></div>
            <button id="uploadBtn" class="btn" onclick="uploadFiles()" disabled>上传选中文件</button>
            <div id="uploadStatus"></div>
        </div>

        <!-- 管理标签页 -->
        <div id="manage-tab" class="tab-content">
            <input type="text" class="search-box" id="searchInput" placeholder="🔍 搜索文件名...">
            <button class="btn" onclick="loadDocuments()">刷新列表</button>

            <table id="documentTable">
                <thead>
                    <tr>
                        <th>文件名</th>
                        <th>类型</th>
                        <th>切片数</th>
                        <th>上传时间</th>
                        <th>SHA-256</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="documentList"></tbody>
            </table>

            <div class="pagination" id="pagination"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8080/api';
        let selectedFiles = [];
        let currentPage = 1;
        const pageSize = 10;

        // ========== 标签页切换 ==========
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

            event.target.classList.add('active');
            document.getElementById(tab + '-tab').classList.add('active');

            if (tab === 'manage') {
                loadDocuments();
            }
        }

        // ========== 文件上传 ==========
        const dropArea = document.getElementById('dropArea');

        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropArea.addEventListener(eventName, e => { e.preventDefault(); e.stopPropagation(); }, false);
        });

        ['dragenter', 'dragover'].forEach(eventName => {
            dropArea.addEventListener(eventName, () => dropArea.classList.add('dragover'), false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropArea.addEventListener(eventName, () => dropArea.classList.remove('dragover'), false);
        });

        dropArea.addEventListener('drop', e => handleFiles(e.dataTransfer.files), false);
        document.getElementById('fileInput').addEventListener('change', e => handleFiles(e.target.files));

        function handleFiles(files) {
            selectedFiles = Array.from(files);
            displayFileList();
            document.getElementById('uploadBtn').disabled = selectedFiles.length === 0;
        }

        function displayFileList() {
            const fileListDiv = document.getElementById('fileList');
            fileListDiv.innerHTML = selectedFiles.map(f => `
                <div class="file-item">
                    <span>📄 ${f.name} (${(f.size/1024).toFixed(2)} KB)</span>
                </div>
            `).join('');
        }

        async function calculateSHA256(file) {
            const buffer = await file.arrayBuffer();
            const hashBuffer = await crypto.subtle.digest('SHA-256', buffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function uploadFiles() {
            const statusDiv = document.getElementById('uploadStatus');
            statusDiv.innerHTML = '<div class="info">⏳ 正在处理文件...</div>';
            document.getElementById('uploadBtn').disabled = true;

            try {
                for (const file of selectedFiles) {
                    statusDiv.innerHTML += `<div class="info">🔐 计算 ${file.name} 的SHA-256...</div>`;

                    const fileHash = await calculateSHA256(file);
                    statusDiv.innerHTML += `<div class="info hash-display">哈希值: ${fileHash}</div>`;

                    // 检查文件是否已存在
                    const checkRes = await fetch(`${API_BASE}/upload/check?fileHash=${fileHash}`);
                    const checkResult = await checkRes.json();

                    if (checkResult.data.exists) {
                        statusDiv.innerHTML += `<div class="warning">⚠️ ${file.name} 已存在，跳过上传</div>`;
                        continue;
                    }

                    // 上传新文件
                    statusDiv.innerHTML += `<div class="info">⬆️ 上传 ${file.name}...</div>`;
                    const formData = new FormData();
                    formData.append('file', file);
                    formData.append('fileHash', fileHash);

                    const uploadRes = await fetch(`${API_BASE}/upload`, {
                        method: 'POST',
                        body: formData
                    });

                    const uploadResult = await uploadRes.json();

                    if (uploadResult.code === 200) {
                        statusDiv.innerHTML += `<div class="success">✅ ${file.name} 上传成功！</div>`;
                    } else {
                        statusDiv.innerHTML += `<div class="error">❌ ${file.name} 上传失败: ${uploadResult.message}</div>`;
                    }
                }

                statusDiv.innerHTML += '<div class="success"><strong>✨ 全部处理完成！</strong></div>';
                selectedFiles = [];
                displayFileList();

            } catch (error) {
                statusDiv.innerHTML += `<div class="error">❌ 错误: ${error.message}</div>`;
            } finally {
                document.getElementById('uploadBtn').disabled = false;
            }
        }

        // ========== 文档管理 ==========
        async function loadDocuments() {
            const keyword = document.getElementById('searchInput').value;

            try {
                const res = await fetch(
                    `${API_BASE}/documents?page=${currentPage}&pageSize=${pageSize}&keyword=${keyword}`
                );
                const result = await res.json();

                if (result.code !== 200) {
                    alert('加载失败: ' + result.message);
                    return;
                }

                const docs = result.data.items;
                const tbody = document.getElementById('documentList');

                tbody.innerHTML = docs.map(doc => `
                    <tr>
                        <td>${doc.filename || '未知'}</td>
                        <td>${doc.sourceType || '-'}</td>
                        <td>${doc.chunkCount || 0}</td>
                        <td>${doc.createdAt ? new Date(doc.createdAt).toLocaleString() : '-'}</td>
                        <td class="hash-display">${doc.fileHash ? doc.fileHash.substring(0, 16) + '...' : '无'}</td>
                        <td>
                            <button class="btn btn-danger" onclick="deleteDocument('${doc.fileHash}', '${doc.filename}')">
                                🗑️ 删除
                            </button>
                        </td>
                    </tr>
                `).join('');

                // 分页
                renderPagination(result.data.totalPages);

            } catch (error) {
                alert('加载失败: ' + error.message);
            }
        }

        function renderPagination(totalPages) {
            const pagination = document.getElementById('pagination');
            let html = '';

            if (currentPage > 1) {
                html += `<button class="page-btn" onclick="changePage(${currentPage - 1})">上一页</button>`;
            }

            for (let i = 1; i <= totalPages; i++) {
                if (i === currentPage) {
                    html += `<button class="page-btn active">${i}</button>`;
                } else if (Math.abs(i - currentPage) <= 2 || i === 1 || i === totalPages) {
                    html += `<button class="page-btn" onclick="changePage(${i})">${i}</button>`;
                } else if (Math.abs(i - currentPage) === 3) {
                    html += `<span>...</span>`;
                }
            }

            if (currentPage < totalPages) {
                html += `<button class="page-btn" onclick="changePage(${currentPage + 1})">下一页</button>`;
            }

            pagination.innerHTML = html;
        }

        function changePage(page) {
            currentPage = page;
            loadDocuments();
        }

        async function deleteDocument(fileHash, filename) {
            if (!fileHash) {
                alert('该文档缺少文件哈希值，无法删除');
                return;
            }

            if (!confirm(`确定要删除 "${filename}" 吗？`)) {
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/documents/${fileHash}`, {
                    method: 'DELETE'
                });
                const result = await res.json();

                if (result.code === 200) {
                    alert('✅ 删除任务已提交\n任务ID: ' + result.data.taskId);
                    loadDocuments();
                } else {
                    alert('❌ 删除失败: ' + result.message);
                }
            } catch (error) {
                alert('❌ 删除失败: ' + error.message);
            }
        }

        // 搜索框事件
        document.getElementById('searchInput').addEventListener('keyup', e => {
            if (e.key === 'Enter') {
                currentPage = 1;
                loadDocuments();
            }
        });

        // 初始加载
        window.onload = () => {
            console.log('RAG知识库管理系统已加载');
        };
    </script>
</body>
</html>
