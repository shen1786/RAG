<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG Knowledge Hub</title>
  <meta name="description" content="智能知识库问答系统 - AI对话、文档管理、文件上传一站式平台" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
  <!-- Sidebar Navigation -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="#22C55E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="logo-text">RAG Hub</span>
    </div>

    <nav class="sidebar-nav">
      <a href="#chat" class="nav-item active" id="nav-chat" onclick="navigateTo('chat')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>AI 对话</span>
      </a>
      <a href="#knowledge" class="nav-item" id="nav-knowledge" onclick="navigateTo('knowledge')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>知识库</span>
      </a>
      <a href="#upload" class="nav-item" id="nav-upload" onclick="navigateTo('upload')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <polyline points="17 8 12 3 7 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="12" y1="3" x2="12" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>上传中心</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="12" cy="7" r="4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div>
          <div class="user-id-label">账号名</div>
          <input class="user-id-input" id="globalUsername" type="text" value="demo_user" placeholder="输入账号名" onchange="ensureLoginForStaticPage(true)" />
        </div>
      </div>
      <div class="user-info" style="margin-top: 12px;">
        <div class="user-avatar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <path d="M4 7h16M4 12h16M4 17h10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div style="display:flex; flex-direction:column; gap:8px; width:100%;">
          <input class="user-id-input" id="globalPassword" type="password" value="password123" placeholder="输入密码" onchange="ensureLoginForStaticPage(true)" />
          <input class="user-id-input" id="globalEmail" type="email" value="demo_user@example.com" placeholder="输入邮箱" onchange="ensureLoginForStaticPage(true)" />
        </div>
      </div>
    </div>
  </aside>

  <!-- Mobile toggle -->
  <button class="mobile-menu-btn" id="mobileMenuBtn" onclick="toggleSidebar()">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
      <line x1="3" y1="6" x2="21" y2="6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <line x1="3" y1="12" x2="21" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <line x1="3" y1="18" x2="21" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
  </button>

  <!-- Main Content -->
  <main class="main-content" id="mainContent">
    <!-- Pages will be loaded here -->
  </main>

  <!-- Toast Notification -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="js/utils.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/knowledge.js"></script>
  <script src="js/upload.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
