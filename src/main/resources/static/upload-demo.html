<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHA-256 文件上传示例</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .upload-area {
            border: 2px dashed #ccc;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            margin: 20px 0;
        }
        .upload-area.dragover {
            border-color: #4CAF50;
            background-color: #f0f8f0;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        #status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 4px;
        }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
        .info { background-color: #d1ecf1; color: #0c5460; }
        .warning { background-color: #fff3cd; color: #856404; }
    </style>
</head>
<body>
    <h1>RAG 文件上传（SHA-256去重）</h1>

    <div class="upload-area" id="dropArea">
        <p>拖拽文件到这里，或</p>
        <input type="file" id="fileInput" multiple style="display:none">
        <button onclick="document.getElementById('fileInput').click()">选择文件</button>
    </div>

    <div id="fileList"></div>
    <button id="uploadBtn" onclick="uploadFiles()" disabled>上传文件</button>
    <div id="status"></div>

    <script>
        const API_BASE = 'http://localhost:8080/api';
        let selectedFiles = [];

        // 初始化拖拽上传
        const dropArea = document.getElementById('dropArea');

        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropArea.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropArea.addEventListener(eventName, () => {
                dropArea.classList.add('dragover');
            }, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropArea.addEventListener(eventName, () => {
                dropArea.classList.remove('dragover');
            }, false);
        });

        dropArea.addEventListener('drop', (e) => {
            const files = e.dataTransfer.files;
            handleFiles(files);
        }, false);

        document.getElementById('fileInput').addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        function handleFiles(files) {
            selectedFiles = Array.from(files);
            displayFileList();
            document.getElementById('uploadBtn').disabled = selectedFiles.length === 0;
        }

        function displayFileList() {
            const fileListDiv = document.getElementById('fileList');
            fileListDiv.innerHTML = '<h3>选中的文件：</h3>' +
                selectedFiles.map(f => `<div>📄 ${f.name} (${(f.size/1024).toFixed(2)} KB)</div>`).join('');
        }

        /**
         * 计算文件的 SHA-256 哈希值
         */
        async function calculateSHA256(file) {
            const buffer = await file.arrayBuffer();
            const hashBuffer = await crypto.subtle.digest('SHA-256', buffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            return hashHex;
        }

        /**
         * 检查文件是否已存在
         */
        async function checkFileExists(fileHash) {
            const response = await fetch(`${API_BASE}/upload/check?fileHash=${fileHash}`);
            const result = await response.json();
            return result;
        }

        /**
         * 上传文件
         */
        async function uploadFiles() {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = '<div class="info">正在处理文件...</div>';
            document.getElementById('uploadBtn').disabled = true;

            try {
                for (const file of selectedFiles) {
                    statusDiv.innerHTML += `<div class="info">📝 正在计算 ${file.name} 的SHA-256...</div>`;

                    // 1. 计算文件哈希
                    const fileHash = await calculateSHA256(file);
                    console.log(`File: ${file.name}, SHA-256: ${fileHash}`);

                    // 2. 检查文件是否已存在
                    statusDiv.innerHTML += `<div class="info">🔍 检查文件是否已存在...</div>`;
                    const checkResult = await checkFileExists(fileHash);

                    if (checkResult.data.exists) {
                        statusDiv.innerHTML += `<div class="warning">⚠️ ${file.name} 已存在，跳过上传<br>` +
                            `源ID: ${checkResult.data.sourceId}<br>` +
                            `切片数: ${checkResult.data.chunkCount}</div>`;
                        continue;
                    }

                    // 3. 文件不存在，上传
                    statusDiv.innerHTML += `<div class="info">⬆️ 上传 ${file.name}...</div>`;
                    const formData = new FormData();
                    formData.append('file', file);
                    formData.append('fileHash', fileHash);

                    const uploadResponse = await fetch(`${API_BASE}/upload`, {
                        method: 'POST',
                        body: formData
                    });

                    const uploadResult = await uploadResponse.json();

                    if (uploadResult.code === 200) {
                        statusDiv.innerHTML += `<div class="success">✅ ${file.name} 上传成功！<br>` +
                            `源ID: ${uploadResult.data.sourceId}<br>` +
                            `状态: ${uploadResult.data.message}</div>`;
                    } else {
                        statusDiv.innerHTML += `<div class="error">❌ ${file.name} 上传失败: ${uploadResult.message}</div>`;
                    }
                }

                statusDiv.innerHTML += '<div class="success"><strong>全部处理完成！</strong></div>';

            } catch (error) {
                statusDiv.innerHTML += `<div class="error">❌ 错误: ${error.message}</div>`;
            } finally {
                document.getElementById('uploadBtn').disabled = false;
            }
        }
    </script>
</body>
</html>
