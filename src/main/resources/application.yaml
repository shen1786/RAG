server:
  servlet:
    encoding:
      enabled: true
      force: true
      charset: UTF-8
spring:
  application:
    name: demo
  ai:
    mcp:
      client:
        type: async
        request-timeout: 60s
        toolcallback:
          enabled: true
        sse:
          baidu-mcp:
            url: https://mcp.map.baidu.com/sse
            headers:
              ak: ${BAIDU_MAP_AK:your-baidu-map-ak}
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:your-dashscope-api-key}
      chat:
        options:
          stream: true
      embedding:
        options:
          model: text-embedding-v3
    vectorstore:
      redis:
        initialize-schema: true
        index-name: atguigu-index
        prefix: atguigu-prefix
        # 璁剧疆鍚戦噺鏁版嵁姘镐笉杩囨湡锛? 琛ㄧず涓嶈繃鏈燂級
        ttl-seconds: 0
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB
  datasource:
    url: jdbc:mysql://39.108.175.183:3306/rag_knowledge?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true
    username: root
    password: nm561234789
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      max-lifetime: 600000       # 10 minutes
      connection-timeout: 30000
      validation-timeout: 5000
      keepalive-time: 30000
  data:
    redis:
      host: 120.24.238.51
      port: 6379
      password: nm561234789 # 璇锋浛鎹负鎮ㄥ湪鏈嶅姟鍣ㄤ笂璁剧疆鐨勫己瀵嗙爜
      database: 0
      timeout: 60000ms
      connect-timeout: 30000ms
      jedis:
        pool:
          max-active: 32
          max-idle: 16
          min-idle: 4
          max-wait: 60000ms
          time-between-eviction-runs: 30000ms
          min-evictable-idle-time: 60000ms
  rabbitmq:
    host: 120.24.238.51
    port: 5672
    username: rabbitmq
    password: nm561234789
    virtual-host: /
    connection-timeout: 30000  # 杩炴帴瓒呮椂 30 绉?
    listener:
      simple:
        # 娑堣垂鑰呭苟鍙戞暟锛堟牴鎹湇鍔″櫒鎬ц兘璋冩暣锛?
        concurrency: 3
        max-concurrency: 10
        # 鎵嬪姩纭妯″紡锛岄槻姝㈡秷鎭涪澶?
        acknowledge-mode: manual
        # 棰勫彇鏁伴噺锛堟瘡娆′粠闃熷垪鎷夊彇鐨勬秷鎭暟锛?
