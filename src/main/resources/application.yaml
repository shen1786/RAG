server:
  servlet:
    encoding:
      enabled: true
      force: true
      charset: UTF-8
spring:
  profiles:
    active: local
  application:
    name: demo
  flyway:
    enabled: true
    baseline-on-migrate: true
  ai:
    mcp:
      client:
        type: async
        request-timeout: 60s
        toolcallback:
          enabled: true
        sse:
          baidu-mcp:
            url: https://mcp.map.baidu.com/sse
            headers:
              ak: ${BAIDU_MAP_AK:your-baidu-map-ak}
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:your-dashscope-api-key}
      connect-timeout-ms: 10000
      read-timeout-ms: 60000
      chat:
        options:
          stream: true
      embedding:
        options:
          model: text-embedding-v3
    vectorstore:
      redis:
        initialize-schema: true
        index-name: atguigu-index
        prefix: atguigu-prefix
        # 设置向量数据永不过期（0 表示不过期）
        ttl-seconds: 0
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB
  datasource:
    url: jdbc:mysql://182.92.193.229:3306/rag_knowledge?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true
    username: root
    password: mysql123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      max-lifetime: 600000       # 10 minutes
      connection-timeout: 30000
      validation-timeout: 5000
      keepalive-time: 30000
  data:
    redis:
      host: 182.92.193.229
      port: 6379
      password: redis123456 # 请替换为您在服务器上设置的强密码
      database: 0
      timeout: 60000ms
      connect-timeout: 30000ms
      jedis:
        pool:
          max-active: 32
          max-idle: 16
          min-idle: 4
          max-wait: 60000ms
          time-between-eviction-runs: 30000ms
          min-evictable-idle-time: 60000ms
  rabbitmq:
    host: 182.92.193.229
    port: 5672
    username: rabbitmq
    password: mq123456
    virtual-host: /
    connection-timeout: 30000  # 连接超时 30 秒
    listener:
      simple:
        # 消费者并发数（根据服务器性能调整）
        concurrency: 3
        max-concurrency: 10
        # 手动确认模式，防止消息丢失
        acknowledge-mode: manual
        # 预取数量（每次从队列拉取的消息数）
        prefetch: 1
        # 消费者超时时间（默认30分钟太短，改为1小时）
        idle-event-interval: 7200000
    template:
      # 发送消息失败时的重试机制
      retry:
        enabled: true
        initial-interval: 1000
        max-attempts: 3

minio:
  endpoint: http://182.92.193.229:9000
  access-key: minio
  secret-key: minio123456
  bucket: rag-knowledge

# 文件上传配置
file:
  upload:
    temp-dir: ./temp/chunks  # 分片临时存储目录

aliyun:
  asr:
    access-key-id: ${ALIYUN_ASR_ACCESS_KEY_ID:your-aliyun-asr-access-key-id}
    access-key-secret: ${ALIYUN_ASR_ACCESS_KEY_SECRET:your-aliyun-asr-access-key-secret}
    app-key: ${ALIYUN_ASR_APP_KEY:your-aliyun-asr-app-key}


video:
  segment-duration: 30
  keyframe-interval: 5

chunking:
  # 旧的固定切割配置（已废弃，保留用于参考）
  fixed:
    chunk-size: 1000
    overlap: 200

  # 新的 Token 切割配置（推荐使用）
  token:
    # 默认每个分块的 token 数量（800 tokens ≈ 3200 字符，适合大多数 AI 模型）
    default-chunk-size: 800
    # PPT 专用的 chunk size（可以设置更大，因为 PPT 内容结构化）
    ppt-chunk-size: 1000
    # 最小分块字符数（避免分块过小）
    min-chunk-size-chars: 350
    # 最小嵌入长度（短于此长度的文本不会被嵌入）
    min-chunk-length-to-embed: 5
    # 最大分块数量（防止文档过大导致内存问题）
    max-num-chunks: 10000
    # 是否保留分隔符（段落、句子边界等）
    keep-separator: true

# 聊天记忆配置
chat:
  memory:
    # 传给模型的最近消息窗口大小（条）
    max-messages: 10
    # 总消息超过此阈值时触发摘要（必须大于 max-messages）
    summarize-threshold: 12
    # 助手回复截断长度（摘要时节省 Token）
    assistant-truncate-length: 300
    # 摘要最大字数限制
    summary-max-length: 500

# RAG 配置
rag:
  model:
    vision: qwen-plus        # 多模态视觉模型（图片描述）
    main-chat: qwen-plus  # 主聊天模型
    deep-chat: qwen-plus       # 深度对话模型
    summary-chat: qwen-plus    # 摘要生成模型
    rerank: gte-rerank-v2      # Rerank 模型
  retrieval:
    candidate-top-k: 15
    similarity-threshold: 0.3
    final-top-k: 5
    hit-score-threshold: 0.35

# Sa-Token 配置
sa-token:
  # token 名称（前端通过 header satoken 传递）
  token-name: satoken
  # token 有效期（秒），默认30天
  timeout: 2592000
  # token 最低活跃频率（秒），超过此时间无操作则 token 过期，-1 表示不限
  active-timeout: -1
  # 是否允许同一账号多地同时登录
  is-concurrent: true
  # 在多人登录同一账号时，是否共享一个 token
  is-share: false
  # token 风格
  token-style: uuid

auth:
  password-recovery:
    expose-reset-code: false

app:
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://localhost:3000
      - http://127.0.0.1:5173
      - http://127.0.0.1:3000
  mail:
    from: ${spring.mail.username:}
    fallback-dir: ./temp/emails

mineru:
  api-key: ${MINERU_API_KEY:your-mineru-api-key}
  model-version: vlm

resilience4j:
  circuitbreaker:
    instances:
      dashscope-chat:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        failure-rate-threshold: 50
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 10s
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
      dashscope-rerank:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        failure-rate-threshold: 50
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 5s
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
  timelimiter:
    instances:
      dashscope-chat:
        timeout-duration: 60s
        cancel-running-future: false



# Actuator health checks
management:
  endpoint:
    health:
      show-details: always
  health:
    db:
      enabled: true
    redis:
      enabled: true
    rabbit:
      enabled: true
