# 鏂囦欢涓婁紶閰嶇疆
file:
  upload:
    temp-dir: ./temp/chunks  # 鍒嗙墖涓存椂瀛樺偍鐩綍

aliyun:
  asr:
    access-key-id: ${ALIYUN_ASR_ACCESS_KEY_ID:your-aliyun-asr-access-key-id}
    access-key-secret: ${ALIYUN_ASR_ACCESS_KEY_SECRET:your-aliyun-asr-access-key-secret}
    app-key: ${ALIYUN_ASR_APP_KEY:your-aliyun-asr-app-key}


video:
  segment-duration: 30
  keyframe-interval: 5

chunking:
  # 鏃х殑鍥哄畾鍒囧壊閰嶇疆锛堝凡搴熷純锛屼繚鐣欑敤浜庡弬鑰冿級
  fixed:
    chunk-size: 1000
    overlap: 200

  # 鏂扮殑 Token 鍒囧壊閰嶇疆锛堟帹鑽愪娇鐢級
  token:
    # 榛樿姣忎釜鍒嗗潡鐨?token 鏁伴噺锛?00 tokens 鈮?3200 瀛楃锛岄€傚悎澶у鏁?AI 妯″瀷锛?
    default-chunk-size: 800
    # PPT 涓撶敤鐨?chunk size锛堝彲浠ヨ缃洿澶э紝鍥犱负 PPT 鍐呭缁撴瀯鍖栵級
    ppt-chunk-size: 1000
    # 鏈€灏忓垎鍧楀瓧绗︽暟锛堥伩鍏嶅垎鍧楄繃灏忥級
    min-chunk-size-chars: 350
    # 鏈€灏忓祵鍏ラ暱搴︼紙鐭簬姝ら暱搴︾殑鏂囨湰涓嶄細琚祵鍏ワ級
    min-chunk-length-to-embed: 5
    # 鏈€澶у垎鍧楁暟閲忥紙闃叉鏂囨。杩囧ぇ瀵艰嚧鍐呭瓨闂锛?
    max-num-chunks: 10000
    # 鏄惁淇濈暀鍒嗛殧绗︼紙娈佃惤銆佸彞瀛愯竟鐣岀瓑锛?
    keep-separator: true

# 鑱婂ぉ璁板繂閰嶇疆
chat:
  memory:
    # 浼犵粰妯″瀷鐨勬渶杩戞秷鎭獥鍙ｅぇ灏忥紙鏉★級
    max-messages: 10
    # 鎬绘秷鎭秴杩囨闃堝€兼椂瑙﹀彂鎽樿锛堝繀椤诲ぇ浜?max-messages锛?
    summarize-threshold: 12
    # 鍔╂墜鍥炲鎴柇闀垮害锛堟憳瑕佹椂鑺傜渷 Token锛?
    assistant-truncate-length: 300
    # 鎽樿鏈€澶у瓧鏁伴檺鍒?
    summary-max-length: 500

# RAG 妫€绱㈤厤缃?
rag:
  retrieval:
    # 绮楀彫鍥炲€欓€夋暟閲忥紙鍚戦噺妫€绱㈤樁娈碉紝Rerank 鍓嶏級
    # 鍊艰秺澶у彫鍥炶秺鍏ㄩ潰锛屼絾 Rerank 鑰楁椂涔熻秺闀?
    candidate-top-k: 15
    # 鍚戦噺鐩镐技搴︽渶浣庨槇鍊硷紙浣庝簬姝ゅ垎鏁扮殑缁撴灉鐩存帴涓㈠純锛?
    # 璁句綆涓€浜涜 Rerank 鏈夋洿澶氬€欓€夋潵绮炬帓
    similarity-threshold: 0.3
    # Rerank 鍚庢渶缁堣繑鍥炵殑鏂囨。鏁伴噺
    final-top-k: 5
    # 鍒ゅ畾"鍛戒腑鐭ヨ瘑搴?鐨勬渶浣?Rerank 鍒嗘暟
    # 浣庝簬姝ゅ垎鏁拌涓烘湭鍛戒腑锛岃蛋绾€氱敤闂瓟
    hit-score-threshold: 0.35
  rerank:
    # Rerank 妯″瀷鍚嶇О锛圖ashScope 鎻愪緵锛?
    model: gte-rerank-v2

# Sa-Token 閰嶇疆
sa-token:
  # token 鍚嶇О锛堝墠绔€氳繃 header satoken 浼犻€掞級
  token-name: satoken
  # token 鏈夋晥鏈燂紙绉掞級锛岄粯璁?0澶?
  timeout: 2592000
  # token 鏈€浣庢椿璺冮鐜囷紙绉掞級锛岃秴杩囨鏃堕棿鏃犳搷浣滃垯 token 杩囨湡锛?1 琛ㄧず涓嶉檺
  active-timeout: -1
  # 鏄惁鍏佽鍚屼竴璐﹀彿澶氬湴鍚屾椂鐧诲綍
  is-concurrent: true
  # 鍦ㄥ浜虹櫥褰曞悓涓€璐﹀彿鏃讹紝鏄惁鍏辩敤涓€涓?token
  is-share: false
  # token 椋庢牸
  token-style: uuid

auth:
  password-recovery:
    expose-reset-code: false

app:
